<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Chatbot</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: "Georgia", "Times New Roman", serif;
        background: #f7f2ea;
        color: #1f1f1f;
      }
      main {
        max-width: 860px;
        margin: 10vh auto 6vh;
        padding: 0 24px;
      }
      h1 {
        font-size: clamp(2.2rem, 4vw, 3.4rem);
        letter-spacing: 0.5px;
        margin-bottom: 8px;
      }
      p {
        font-size: 1.1rem;
        line-height: 1.6;
      }
      .card {
        margin-top: 28px;
        padding: 20px 22px;
        background: #fff8ef;
        border: 1px solid #e6d9c7;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      }
      code {
        background: #f0e7db;
        padding: 2px 6px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AI Chatbot</h1>
      <p>
        GitHub Pages is now set up via Actions. This placeholder page confirms
        the deployment is working.
      </p>
      <div class="card">
        <p>
          Run the app locally with <code>python app.py</code> after installing
          requirements.
        </p>
        <p>
          Source lives in <code>backend/chatbot.py</code>.
        </p>
      </div>
    </main>
  </body>
</html>
